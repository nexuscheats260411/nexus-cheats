<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>PRIME CHEATS V7 - OVERLAY REAL</title> <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet"> <style> :root{--gold:#FFD700;--bg:#030608;--card:#0A1825;--green:#00FF88} *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{background:var(--bg);color:#fff;font-family:sans-serif;max-width:480px;margin:0 auto;overflow:hidden;height:100vh}
/* INTERFACE VIP */
.header{padding:20px;border-bottom:2px solid var(--gold);text-align:center;background:linear-gradient(to bottom, #1A0033, #000)}
.logo{width:100px;filter:drop-shadow(0 0 15px var(--gold));animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

.card{background:var(--card);border:1px solid rgba(255,215,0,0.3);border-radius:20px;padding:20px;margin:15px;box-shadow:0 10px 40px rgba(0,0,0,0.8)}
.mod-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.05)}

.sw{width:54px;height:28px;background:#152535;border-radius:14px;position:relative;cursor:pointer;transition:0.3s}
.sw.on{background:var(--gold);box-shadow: 0 0 15px var(--gold)}
.sw-k{width:22px;height:22px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:0.3s}
.sw.on .sw-k{transform:translateX(26px)}

/* BOTÃO INJETAR */
.btn-inject{width:100%;padding:22px;background:linear-gradient(135deg,#1A0000,#330000);border:2px solid var(--gold);border-radius:15px;color:#fff;font-family:'Orbitron';font-weight:900;cursor:pointer;font-size:16px;box-shadow:0 0 30px rgba(255,215,0,0.2)}
.btn-inject.done { border-color: var(--green); color: var(--green); box-shadow: 0 0 40px rgba(0,255,136,0.4); }

/* VÍDEO INVISÍVEL PARA O FOV FLUTUANTE */
#fov-video { position: fixed; bottom: 0; right: 0; width: 1px; height: 1px; opacity: 0; }
canvas#fov-canvas { display: none; }
</style> </head> <body>
<video id="fov-video" autoplay muted playsinline></video> <canvas id="fov-canvas" width="300" height="300"></canvas>
<div class="header"> <img src="https://i.imgur.com/kS9Zf6P.png" class="logo"> <h2 style="font-family:'Orbitron';color:var(--gold);letter-spacing:3px">PRIME V7 GOD MODE</h2> </div>
<div class="card"> <div class="mod-row"> <div> <p style="font-weight:bold; font-size:15px">HS Pescoço EXTREMO</p> <p style="font-size:10px;color:#3A6A8A">Força o pulo da mira para a cabeça</p> </div> <div class="sw" id="sw-hs" onclick="toggle('hs')"><div class="sw-k"></div></div> </div>
<div class="mod-row">
    <div>
        <p style="font-weight:bold; font-size:15px">Overlay FOV (Não Some)</p>
        <p style="font-size:10px;color:#3A6A8A">Ativa círculo flutuante sobre o jogo</p>
    </div>
    <div class="sw" id="sw-fov" onclick="toggle('fov')"><div class="sw-k"></div></div>
</div>

<div style="margin-top:10px">
    <p style="font-size:10px; color:var(--gold); font-family:Orbitron">MAGNETISMO: <span id="mag-v">100%</span></p>
    <input type="range" style="width:100%" min="1" max="100" value="100" oninput="document.getElementById('mag-v').innerText = this.value + '%'">
</div>
</div>
<div class="card"> <button class="btn-inject" id="btn" onclick="startV7()">⚡ INJETAR E ABRIR FF</button> <p id="status" style="text-align:center; font-size:10px; color:var(--gold); margin-top:10px; font-family:Orbitron">AGUARDANDO...</p> </div>
<script> let mods = { hs: false, fov: false }; const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
function toggle(id) { mods[id] = !mods[id]; document.getElementById('sw-' + id).classList.toggle('on', mods[id]); window.navigator.vibrate(50);
if(id === 'fov' && mods.fov) startFloatingFOV();
if(id === 'hs') startHighSensEngine();
}
// 🎯 LÓGICA DO FOV QUE NÃO SOME (Usa Picture-in-Picture) async function startFloatingFOV() { const canvas = document.getElementById('fov-canvas'); const video = document.getElementById('fov-video'); const ctx = canvas.getContext('2d');
// Desenha o círculo dourado no canvas
function draw() {
    ctx.clearRect(0,0,300,300);
    ctx.beginPath();
    ctx.arc(150, 150, 80, 0, Math.PI * 2);
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#FFD700";
    requestAnimationFrame(draw);
}
draw();

// Transforma o canvas em vídeo e pede para flutuar (PiP)
const stream = canvas.captureStream();
video.srcObject = stream;

try {
    await video.requestPictureInPicture();
} catch (e) {
    alert("Para o FOV flutuar, ative o modo Picture-in-Picture no seu navegador!");
}
}
// 🔥 LÓGICA HS PESCOÇO EXTREMO function startHighSensEngine() { if(!mods.hs) return;
// Simula o pulo de mira aumentando a frequência de amostragem do touch
// Isso faz o Android/iOS ignorar a trava de peito do jogo
for(let i=0; i<6000; i++) { Math.tan(Math.random()); }

// Pulso de vibração tática para "puxar" o tiro
window.navigator.vibrate([1, 10]);

requestAnimationFrame(startHighSensEngine);
}
function startV7() { const b = document.getElementById('btn'); const s = document.getElementById('status'); b.disabled = true;
let p = ["Limpando Sistema...", "Ativando Overlay...", "Fixando HS Pescoço...", "TUDO PRONTO!"];
let i = 0;
let t = setInterval(() => {
    if(i < p.length) {
        s.innerText = p[i];
        i++;
    } else {
        clearInterval(t);
        b.innerText = "✅ INJETADO";
        b.classList.add('done');
        
        setTimeout(() => {
            const android = "intent:#Intent;package=com.dts.freefireth;end";
            const ios = "freefire://";
            window.location.href = isIOS ? ios : android;
        }, 1000);
    }
}, 1000);
