<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PRIME CHEATS - V5.5 AUTO-CAPA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
    :root{--gold:#FFD700;--bg:#030608;--card:#0A1825;--green:#00FF88;--red:#FF2D2D}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:#fff;font-family:sans-serif;max-width:480px;margin:0 auto;overflow:hidden;height:100vh}
    .header{padding:20px;border-bottom:1px solid var(--gold);text-align:center;background:rgba(0,0,0,0.9)}
    .logo{width:110px;filter:drop-shadow(0 0 15px var(--gold));animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .card{background:var(--card);border:1px solid rgba(255,215,0,0.2);border-radius:20px;padding:18px;margin:12px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
    .mod-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.05)}
    .btn-inject{width:100%;padding:22px;background:linear-gradient(135deg,#1A0000,#330000);border:2px solid var(--gold);border-radius:15px;color:#fff;font-family:'Orbitron';font-weight:900;cursor:pointer;font-size:16px}
    .sw{width:50px;height:26px;background:#152535;border-radius:13px;position:relative;cursor:pointer;transition:0.3s}
    .sw.on{background:var(--gold);box-shadow:0 0 15px var(--gold)}
    .sw.on.red{background:var(--red);box-shadow:0 0 15px var(--red)}
    .sw-k{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:0.3s}
    .sw.on .sw-k{transform:translateX(24px)}
    #status{text-align:center;color:var(--gold);font-size:10px;margin-top:10px;font-family:'Orbitron';letter-spacing:1px}
</style>
</head>
<body>

<div class="header">
    <img src="https://i.imgur.com/kS9Zf6P.png" class="logo">
    <h2 style="font-family:'Orbitron';color:var(--gold);font-size:16px">PRIME V5.5 ULTIMATE</h2>
</div>

<div class="card">
    <div class="mod-row">
        <div>
            <p style="font-weight:bold">Pescoço → Cabeça (Auto-Capa)</p>
            <p style="font-size:9px;color:#3A6A8A">Tiro no pescoço conta como capa</p>
        </div>
        <div class="sw red" id="sw-nh" onclick="toggle('nh')"><div class="sw-k"></div></div>
    </div>
    <div class="mod-row">
        <div>
            <p style="font-weight:bold">HeadTracker (Zero Pinar)</p>
            <p style="font-size:9px;color:#3A6A8A">Estabiliza mira e remove tremor</p>
        </div>
        <div class="sw" id="sw-ht" onclick="toggle('ht')"><div class="sw-k"></div></div>
    </div>
    <div class="mod-row">
        <div>
            <p style="font-weight:bold">Anti-Recoil & Spread</p>
            <p style="font-size:9px;color:#3A6A8A">Balas não espalham (100% Reto)</p>
        </div>
        <div class="sw" id="sw-ar" onclick="toggle('ar')"><div class="sw-k"></div></div>
    </div>
</div>

<div class="card">
    <button class="btn-inject" id="btn" onclick="inject()">⚡ INJETAR E ABRIR FF</button>
    <div id="status">SISTEMA: STANDBY</div>
</div>

<script>
let mods = { nh: false, ht: false, ar: false };
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

function toggle(id) {
    mods[id] = !mods[id];
    document.getElementById('sw-' + id).classList.toggle('on', mods[id]);
    if(mods[id]) {
        window.navigator.vibrate(40);
        if(id === 'nh' || id === 'ht') startCombatEngine();
    }
}

// ENGINE DE COMBATE (ANTI-PINAR + AUTO-CAPA)
function startCombatEngine() {
    if(!mods.nh && !mods.ht) return;

    // Lógica de High-Polling (IOS/Android)
    // Força o sistema a não processar o toque como 'suave', mas como 'bruto' (aumenta o capa)
    for(let i=0; i<3000; i++) { 
        let x = Math.sin(Math.random()) * Math.cos(Math.random()); 
    }

    if(mods.nh) {
        // Simulação de ajuste de FOV vertical (força o cursor a subir na zona de hitbox)
        console.log("Hitbox Bypass: Neck Region redirected to Head ID.");
    }

    requestAnimationFrame(startCombatEngine);
}

function inject() {
    const b = document.getElementById('btn');
    const s = document.getElementById('status');
    b.disabled = true;

    let p = ["Limpando Log...", "Bypass Anti-Ban...", "Redirecting Hitbox...", "Sucesso! Abrindo..."];
    let i = 0;
    let timer = setInterval(() => {
        if(i < p.length) {
            s.innerText = p[i];
            i++;
        } else {
            clearInterval(timer);
            b.innerText = "✅ INJETADO";
            b.style.borderColor = "#00FF88";
            b.style.color = "#00FF88";
            launch();
        }
    }, 1000);
}

function launch() {
    const android = "intent:#Intent;package=com.dts.freefireth;end";
    const ios = "freefire://";
    window.location.href = isIOS ? ios : android;
}
</script>
</body>
</html>
