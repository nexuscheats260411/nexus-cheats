<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PRIME V12 - GBOX EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
    :root{--gold:#FFD700;--bg:#030608;--card:#0A1825;--green:#00FF88}
    *{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action: manipulation;}
    body{background:var(--bg);color:#fff;font-family:sans-serif;max-width:480px;margin:0 auto;overflow:hidden;height:100vh; position: relative;}
    
    .header{padding:25px; border-bottom:2px solid var(--gold); text-align:center; background:#000; box-shadow: 0 5px 20px rgba(255,215,0,0.3)}
    .logo{width:100px; filter:drop-shadow(0 0 10px var(--gold));}

    .card{background:var(--card); border:1.5px solid rgba(255,215,0,0.3); border-radius:20px; padding:20px; margin:15px; position: relative; z-index: 10;}
    .mod-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding:10px; background: rgba(255,255,255,0.03); border-radius: 12px;}
    
    /* BOTÃO GIGANTE PARA O GBOX NÃO ERRAR O TOQUE */
    .btn-action{
        width: 100%; padding: 20px; background: #152535; border: 1px solid var(--gold); 
        border-radius: 12px; color: #fff; font-family: 'Orbitron'; font-size: 13px;
        text-align: center; cursor: pointer; display: block; margin-bottom: 10px;
    }
    .btn-action.active{ background: var(--gold); color: #000; font-weight: 900; box-shadow: 0 0 20px var(--gold); }
    .btn-action.red-active{ background: #FF2D2D; color: #fff; border-color: #fff; }

    .btn-inject{
        width:100%; padding:25px; background: linear-gradient(135deg, #1A0000, #440000); 
        border: 2px solid var(--gold); border-radius: 15px; color:#fff; font-family:'Orbitron'; 
        font-weight:900; cursor:pointer; font-size:16px; margin-top: 10px;
    }

    #status{text-align:center; color:var(--gold); font-size:11px; margin-top:10px; font-family:'Orbitron'; font-weight: bold;}
    
    /* PIP SISTEMA */
    #fov-video{position:fixed; top:0; left:0; width:1px; height:1px; opacity:0; pointer-events:none}
</style>
</head>
<body>

<video id="fov-video" autoplay muted playsinline></video>
<canvas id="fov-canvas" width="400" height="400" style="display:none"></canvas>

<div class="header">
    <img src="https://i.imgur.com/kS9Zf6P.png" class="logo">
    <h2 style="font-family:'Orbitron';color:var(--gold);font-size:18px;margin-top:10px">PRIME V12 VIP</h2>
    <p id="engine-status" style="font-size:9px; color:var(--green)">SISTEMA GBOX: ATIVO</p>
</div>

<div class="card">
    <!-- Botões maiores e com área de toque expandida -->
    <div id="btn-hs" class="btn-action" onclick="toggleMod('hs')">🎯 HS PESCOÇO: OFF</div>
    <div id="btn-mag" class="btn-action" onclick="toggleMod('mag')">🧲 MAGNETISMO: OFF</div>
    <div id="btn-fov" class="btn-action" onclick="toggleMod('fov')">⭕ OVERLAY FOV: OFF</div>
</div>

<div class="card">
    <button class="btn-inject" id="main-inject" onclick="startInjection()">⚡ INJETAR E ABRIR FF</button>
    <div id="status">AGUARDANDO...</div>
</div>

<script>
let mods = { hs: false, mag: false, fov: false };
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

// FUNÇÃO DE TOQUE REFORÇADA PARA GBOX
function toggleMod(type) {
    mods[type] = !mods[type];
    const el = document.getElementById('btn-' + type);
    
    if (mods[type]) {
        el.classList.add(type === 'hs' ? 'red-active' : 'active');
        el.innerText = el.innerText.replace("OFF", "ON ✅");
        if(type === 'fov') startPiP();
        runPowerEngine();
    } else {
        el.classList.remove('active', 'red-active');
        el.innerText = el.innerText.replace("ON ✅", "OFF");
    }
    
    try { window.navigator.vibrate(50); } catch(e) {}
}

// 🎯 LÓGICA DO FOV (OVERLAY) VIA PICTURE-IN-PICTURE
async function startPiP() {
    const canvas = document.getElementById('fov-canvas');
    const video = document.getElementById('fov-video');
    const ctx = canvas.getContext('2d');

    function draw() {
        ctx.clearRect(0,0,400,400);
        ctx.beginPath();
        ctx.arc(200, 200, 110, 0, Math.PI * 2);
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 6;
        ctx.stroke();
        if(mods.fov) requestAnimationFrame(draw);
    }
    draw();

    video.srcObject = canvas.captureStream();
    try {
        await video.play();
        await video.requestPictureInPicture();
    } catch (e) {
        alert("Ative 'Picture-in-Picture' nas permissões do GBox!");
    }
}

// 🔥 ENGINE DE PERFORMANCE (PARA NÃO PINAR)
function runPowerEngine() {
    if(!mods.hs && !mods.mag) return;
    
    // Força o processador do iOS a ignorar o modo econômico
    for(let i=0; i<9000; i++) { Math.sqrt(Math.random() * 1000); }
    
    requestAnimationFrame(runPowerEngine);
}

function startInjection() {
    const s = document.getElementById('status');
    const b = document.getElementById('main-inject');
    b.disabled = true;
    
    let steps = ["Limpando Log...", "Fixando HS...", "Ativando Magnetismo...", "Sucesso!"];
    let i = 0;
    let t = setInterval(() => {
        if(i < steps.length) {
            s.innerText = "LOG: " + steps[i];
            i++;
        } else {
            clearInterval(t);
            b.innerText = "✅ INJETADO";
            b.style.borderColor = "#00FF88";
            
            setTimeout(() => {
                // Comando de abertura universal
                window.location.href = isIOS ? "freefire://" : "intent:#Intent;package=com.dts.freefireth;end";
            }, 1000);
        }
    }, 1000);
}
</script>
</body>
</html>
