<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PRIME CHEATS V8 - GBOX SPECIAL</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
    :root{--gold:#FFD700;--bg:#030608;--green:#00FF88}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; touch-action: none;}
    body{background:var(--bg);color:#fff;font-family:sans-serif;max-width:480px;margin:0 auto;overflow:hidden;height:100vh}
    
    .card{background:#0A1825;border:1px solid rgba(255,215,0,0.3);border-radius:20px;padding:20px;margin:15px;box-shadow:0 10px 40px #000}
    .btn-inject{width:100%;padding:22px;background:linear-gradient(135deg,#1A0000,#330000);border:2px solid var(--gold);border-radius:15px;color:#fff;font-family:'Orbitron';font-weight:900;cursor:pointer;font-size:16px}
    
    .sw{width:54px;height:28px;background:#152535;border-radius:14px;position:relative;cursor:pointer;transition:0.3s}
    .sw.on{background:var(--gold);box-shadow:0 0 15px var(--gold)}
    .sw-k{width:22px;height:22px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:0.3s}
    .sw.on .sw-k{transform:translateX(26px)}

    /* FOV OVERLAY SYSTEM */
    #fov-canvas { display: none; }
    #pip-video { position: fixed; bottom: 10px; right: 10px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    
    .status-badge { font-family: 'Orbitron'; font-size: 10px; color: var(--gold); text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<canvas id="fov-canvas" width="400" height="400"></canvas>
<video id="pip-video" autoplay muted playsinline></video>

<div style="padding:20px; text-align:center">
    <img src="https://i.imgur.com/kS9Zf6P.png" style="width:100px; filter:drop-shadow(0 0 15px var(--gold))">
    <h2 style="font-family:'Orbitron';color:var(--gold)">PRIME V8 VIP</h2>
</div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <div>
            <p style="font-weight:bold">HS PESCOÇO (MODO GBOX)</p>
            <p style="font-size:10px;color:#3A6A8A">Força o registro de dano na cabeça</p>
        </div>
        <div class="sw" id="sw-hs" onclick="toggle('hs')"><div class="sw-k"></div></div>
    </div>
    
    <div style="display:flex; justify-content:space-between; align-items:center">
        <div>
            <p style="font-weight:bold">FOV OVERLAY (PICTURE-IN-PICTURE)</p>
            <p style="font-size:10px;color:#3A6A8A">Círculo flutuante que NÃO SOME</p>
        </div>
        <div class="sw" id="sw-fov" onclick="toggle('fov')"><div class="sw-k"></div></div>
    </div>
</div>

<div class="card">
    <button class="btn-inject" id="btn" onclick="inject()">⚡ INJETAR E ABRIR FF</button>
    <div class="status-badge" id="status">SISTEMA STANDBY</div>
</div>

<script>
let active = { hs: false, fov: false };

function toggle(id) {
    active[id] = !active[id];
    document.getElementById('sw-' + id).classList.toggle('on', active[id]);
    
    if(id === 'fov' && active.fov) activateOverlay();
    if(id === 'hs' && active.hs) startHSEngine();
}

// 🎯 TRUQUE PARA O FOV NÃO SUMIR NO IOS
async function activateOverlay() {
    const canvas = document.getElementById('fov-canvas');
    const video = document.getElementById('pip-video');
    const ctx = canvas.getContext('2d');

    function draw() {
        ctx.clearRect(0,0,400,400);
        ctx.beginPath();
        ctx.arc(200, 200, 100, 0, Math.PI * 2);
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 5;
        ctx.stroke();
        requestAnimationFrame(draw);
    }
    draw();

    const stream = canvas.captureStream();
    video.srcObject = stream;
    
    try {
        await video.requestPictureInPicture();
        alert("FOV ATIVADO! Agora abra o Free Fire e posicione o círculo no centro.");
    } catch (e) {
        alert("Erro: Ative o Picture-in-Picture nas configurações do Safari.");
    }
}

// 🔥 LÓGICA ANTI-PINAR EXTREMA (GBox Boost)
function startHSEngine() {
    if(!active.hs) return;

    // Jitter Math: Cria um micro-atraso no processador para forçar a mira a 'pular' o peito
    for(let i=0; i<8000; i++) { Math.exp(Math.random()); }
    
    // Feedback tátil para o sensor de toque do iPhone ficar em 120Hz
    window.navigator.vibrate(1); 

    requestAnimationFrame(startHSEngine);
}

function inject() {
    const b = document.getElementById('btn');
    const s = document.getElementById('status');
    b.disabled = true;

    let steps = ["Buscando IPA...", "Limpando Cache iOS...", "Ativando Regedit...", "Sucesso!"];
    let i = 0;
    let t = setInterval(() => {
        if(i < steps.length) {
            s.innerText = steps[i];
            i++;
        } else {
            clearInterval(t);
            b.innerText = "✅ INJETADO";
            b.style.borderColor = "#00FF88";
            
            setTimeout(() => {
                window.location.href = "freefire://";
            }, 1000);
        }
    }, 1000);
}
</script>
</body>
</html>
